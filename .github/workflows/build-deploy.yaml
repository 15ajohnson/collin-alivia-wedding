name: Build and Deploy

on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: node_modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        run: npm install
      - name: Run lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: node_modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        run: npm install
      - name: Run Unit tests
        run: npm run test

  prepare-image-metadata:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      calver_tag: ${{ steps.calver.outputs.tag }}
      image_tags: ${{ steps.image_metadata.outputs.tags }}
      image_labels: ${{ steps.image_metadata.outputs.labels }}
    steps:
      - name: Generate calver tag
        id: calver
        run: |
          echo "tag=$(date +%Y-%m)-build" >> $GITHUB_OUTPUT
      - name: Docker metadata
        id: image_metadata
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/15ajohnson/wedding
          tags: |
            type=raw,value=${{ steps.calver.outputs.tag }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

  build-arch:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    needs: [prepare-image-metadata]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Prepare arch tags
        id: arch_tags
        run: |
          {
            echo "tags<<EOF"
            while IFS= read -r tag; do
              echo "${tag}-${{ matrix.arch }}"
            done <<< "${{ needs.prepare-image-metadata.outputs.image_tags }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Docker build and push
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile
          tags: ${{ steps.arch_tags.outputs.tags }}
          labels: ${{ needs.prepare-image-metadata.outputs.image_labels }}
          platforms: ${{ matrix.platform }}
          push: true

  build-manifest:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [prepare-image-metadata, build-arch]
    permissions:
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Create and push multi-arch manifests
        run: |
          for tag in ${{ needs.prepare-image-metadata.outputs.image_tags }}; do
            docker buildx imagetools create \
              --tag "$tag" \
              "${tag}-amd64" \
              "${tag}-arm64"
          done

  deploy:
    runs-on: ubuntu-latest
    needs: [build-manifest]
    steps:
      - name: Configure ssh key
        env:
          PRIVATE_KEY: ${{ secrets.WEDDING_PRIVATE_KEY }}
        run: |
          echo "$PRIVATE_KEY" > id_rsa_wedding
          chmod 600 id_rsa_wedding
      - name: Docker Compose up
        env:
          HOST: "163.192.215.50"
        run: |
          ssh -i id_rsa_wedding -o "StrictHostKeyChecking no" wedding@$HOST "
            curl -o docker-compose.yaml https://raw.githubusercontent.com/15ajohnson/collin-alivia-wedding/main/docker-compose.yaml
            docker compose pull
            docker compose up -d
          "
