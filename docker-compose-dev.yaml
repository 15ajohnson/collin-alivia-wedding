services:
  db-migrations:
    build:
      context: .
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"
    environment:
      DATABASE_URL: file:/data/rsvp.db
    volumes:
      - rsvp-data:/data

  app:
    build:
      context: .
    depends_on:
      db-migrations:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: file:/data/rsvp.db
    volumes:
      - rsvp-data:/data
    ports:
      - "3002:3002"

volumes:
  rsvp-data:
